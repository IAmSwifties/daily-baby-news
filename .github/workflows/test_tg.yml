name: TG Test Bot

on:
  workflow_dispatch: # 讓我們可以在 GitHub 網頁上手動點擊執行

jobs:
  send_test_message:
    runs-on: ubuntu-latest
    steps:
      - name: Send Message via Curl
        run: |
          curl -X POST "https://api.telegram.org/bot${{ secrets.TG_TOKEN }}/sendMessage" \
          -d "chat_id=${{ secrets.TG_CHAT_ID }}" \
          -d "text=你好 早安午安晚安" \
          -d "disable_notification=false"

          curl -X POST "https://api.telegram.org/bot${{ secrets.TG_TOKEN }}/sendMessage" \
          -d "chat_id=${{ secrets.HIRAY_CHAT_ID }}" \
          -d "text=你好 早安午安晚安" \
          -d "disable_notification=false"
