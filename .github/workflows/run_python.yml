name: Daily Parenting Helper

on:
  schedule:
    - cron: '0 1 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 檢出程式碼
        uses: actions/checkout@v4

      - name: 設定 Python (升級到 3.11)
        uses: actions/setup-python@v5
        with:
          python-version: '3.11' 

      - name: 安裝新版套件
        # 這裡改成安裝 google-genai
        run: |
          pip install google-genai requests beautifulsoup4 googlenewsdecoder trafilatura

      - name: 執行 Python 機器人
        env:
          TG_TOKEN: ${{ secrets.TG_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python main.py
