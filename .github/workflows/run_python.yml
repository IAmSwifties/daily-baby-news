name: Daily Parenting Helper

on:
  schedule:
    - cron: '0 1 * * *' # 每天早上 9:00 (台灣時間)
  workflow_dispatch:      # 讓我們可以手動點擊執行測試

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 檢出程式碼
        uses: actions/checkout@v4

      - name: 設定 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 安裝必要套件
        run: |
          pip install google-generativeai requests

      - name: 執行 Python 機器人
        env:
          TG_TOKEN: ${{ secrets.TG_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python main.py
